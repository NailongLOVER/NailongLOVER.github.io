      set: (key, value, ttl) => {
        if (!ttl) return
        const expiry = Date.now() + ttl * 86400000
        localStorage.setItem(key, JSON.stringify({ value, expiry }))
      },
      get: key => {
        const itemStr = localStorage.getItem(key)
        if (!itemStr) return undefined
        const { value, expiry } = JSON.parse(itemStr)
        if (Date.now() > expiry) {
          localStorage.removeItem(key)
          return undefined
        }
        return value
      }
    }

    window.btf = {
      saveToLocal,

        }
        script.onerror = reject
        document.head.appendChild(script)
      }),

<script>
(function() {
  // 防重复：如果已存在 Fixed 播放器，直接返回
  if (document.querySelector('.aplayer-fixed')) {
    console.log('播放器已存在，继续播放');
    return;
  }
  
  // 安全检查：确保 APlayer 库已加载
  if (typeof APlayer === 'undefined') {
    console.error('APlayer 库加载失败，请刷新页面');
    document.getElementById('music-trigger').innerHTML = 
      '<p style="color:red">播放器加载失败，请刷新页面</p>';
    return;
  }

  // 创建 Fixed 模式播放器（吸底，PJAX 切换不中断）
  new APlayer({
    container: document.getElementById('music-trigger'),
    fixed: true,           // 关键：Fixed 模式，存活于 PJAX 导航
    audio: [{
      name: 'Canon',
      artist: '纯音乐',
      url: '/music/canon.mp3',
      cover: '/img/p1.png'
    }],
    autoplay: false,       // 不自动播放（避免浏览器阻止）
    theme: '#367fc9',
    loop: 'all',
    preload: 'metadata',   // 只预加载元数据，节省流量
    mutex: true            // 互斥播放
  });
  
  console.log('背景音乐已启动，切换到其他页面继续播放');
})();
</script>
